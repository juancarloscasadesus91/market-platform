services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: market_platform
      DB_USERNAME: market
      DB_PASSWORD: market
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      RUN_MIGRATIONS: "true"
      SYNC_DOCKER_ENV: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - sh
      - -lc
      - >
        npx concurrently
        -c "#93c5fd,#c4b5fd,#fdba74"
        "php artisan serve --host=0.0.0.0 --port=8000"
        "php artisan queue:listen --tries=1 --timeout=0"
        "npm run dev -- --host 0.0.0.0 --port 5173"
        --names=server,queue,vite
        --kill-others

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: market_platform
      MYSQL_USER: market
      MYSQL_PASSWORD: market
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umarket", "-pmarket"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
  vendor:
  node_modules:
